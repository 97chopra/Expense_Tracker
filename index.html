<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseIQ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-left">
      <span class="logo">ExpenseIQ</span>
      <span class="nav-month" id="navMonth"></span>
    </div>
    <div class="nav-right">
      <button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-accent" onclick="openModal()">+ Add Transaction</button>
    </div>
  </nav>

  <div class="wrapper">

    <!-- SUMMARY CARDS -->
    <div class="summary-grid">
      <div class="summary-card">
        <span class="s-label">Total Balance</span>
        <span class="s-value" id="balDisplay">$ 0.00</span>
      </div>
      <div class="summary-card income-card">
        <span class="s-label">Total Income</span>
        <span class="s-value green" id="incDisplay">$ 0.00</span>
      </div>
      <div class="summary-card expense-card">
        <span class="s-label">Total Expenses</span>
        <span class="s-value red" id="expDisplay">$ 0.00</span>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">

      <!-- CHART CARD -->
      <div class="card">
        <div class="card-title">Spending Breakdown</div>
        <div class="chart-wrap">
          <canvas id="donutChart"></canvas>
          <div class="chart-center">
            <span class="chart-center-amt" id="chartAmt">$ 0</span>
            <span class="chart-center-lbl">spent</span>
          </div>
        </div>
        <ul class="legend" id="legend"></ul>
      </div>

      <!-- BUDGET + QUICK ADD CARD -->
      <div class="card">
        <div class="card-title">Budget Goals</div>
        <div class="budget-list" id="budgetList"></div>
        <hr class="divider" />
        <div class="card-title">Quick Add</div>
        <div class="add-form">
          <input  type="text"   class="form-input full" id="qDesc" placeholder="Description" />
          <input  type="number" class="form-input"      id="qAmt"  placeholder="Amount ($)" min="0" step="0.01" />
          <select class="form-select"                   id="qType">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
          <select class="form-select full" id="qCat">
            <option value="Food & Groceries">🛒 Food & Groceries</option>
            <option value="Transport">🚌 Transport</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Utilities">💡 Utilities</option>
            <option value="Other">📦 Other</option>
          </select>
          <input type="date" class="form-input full" id="qDate" />
          <button class="btn btn-accent full" onclick="quickAdd()">Add Transaction</button>
        </div>
      </div>

    </div>

    <!-- TRANSACTION HISTORY -->
    <div class="card tx-section">
      <div class="card-title">Transaction History</div>
      <div class="filter-bar" id="filterBar">
        <button class="f-btn active" data-filter="all">All</button>
        <button class="f-btn" data-filter="income">Income</button>
        <button class="f-btn" data-filter="expense">Expenses</button>
        <button class="f-btn" data-filter="Food & Groceries">Food</button>
        <button class="f-btn" data-filter="Transport">Transport</button>
        <button class="f-btn" data-filter="Entertainment">Entertainment</button>
        <button class="f-btn" data-filter="Utilities">Utilities</button>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="form-input" id="searchInput" placeholder="Search transactions..." oninput="renderTransactions()" />
      </div>
      <ul class="tx-list" id="txList"></ul>
    </div>

  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Add Transaction</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-form">
        <span class="form-label">Description</span>
        <input type="text"   class="form-input" id="mDesc" placeholder="e.g. Countdown Groceries" />
        <span class="form-label">Amount ($)</span>
        <input type="number" class="form-input" id="mAmt"  placeholder="0.00" min="0" step="0.01" />
        <span class="form-label">Type</span>
        <select class="form-select" id="mType">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
        <span class="form-label">Category</span>
        <select class="form-select" id="mCat">
          <option value="Food & Groceries">🛒 Food & Groceries</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Utilities">💡 Utilities</option>
          <option value="Other">📦 Other</option>
        </select>
        <span class="form-label">Date</span>
        <input type="date" class="form-input" id="mDate" />
        <button class="btn btn-accent" onclick="modalAdd()">Save Transaction</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
