<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseIQ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0b0b14;
      --bg2:    #13131f;
      --bg3:    #1a1a2e;
      --card:   #12121e;
      --input:  #1c1c2e;
      --border: rgba(255,255,255,0.07);
      --purple: #7c5cbf;
      --cyan:   #00d4ff;
      --green:  #00e676;
      --red:    #ff4d6d;
      --amber:  #ffb347;
      --pink:   #d45cbf;
      --t1:     #e8e8f5;
      --t2:     #9898b8;
      --t3:     #55556a;
      --font:   'Space Grotesk', sans-serif;
    }
    html, body { background: var(--bg); color: var(--t1); font-family: var(--font); min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 99px; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem;
      background: rgba(11,11,20,0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-size: 22px; font-weight: 700; background: linear-gradient(90deg, var(--purple), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-month { font-size: 13px; color: var(--t3); background: var(--bg3); padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border); }
    .nav-right { display: flex; gap: 10px; }

    /* BUTTONS */
    .btn { padding: 9px 18px; border-radius: 10px; font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; }
    .btn-outline { background: transparent; color: var(--t2); }
    .btn-outline:hover { border-color: var(--purple); color: var(--t1); }
    .btn-accent { background: var(--purple); color: #fff; border-color: var(--purple); }
    .btn-accent:hover { background: #9370d8; box-shadow: 0 0 18px rgba(124,92,191,0.4); }

    /* LAYOUT */
    .wrapper { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }

    /* SUMMARY */
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .summary-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 6px;
      position: relative; overflow: hidden; transition: border-color 0.2s;
    }
    .summary-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--purple), transparent);
    }
    .summary-card.income-card::before { background: linear-gradient(90deg, transparent, var(--green), transparent); }
    .summary-card.expense-card::before { background: linear-gradient(90deg, transparent, var(--red), transparent); }
    .summary-card:hover { border-color: rgba(124,92,191,0.3); }
    .s-label { font-size: 12px; color: var(--t3); letter-spacing: 0.05em; text-transform: uppercase; }
    .s-value { font-size: 26px; font-weight: 700; color: var(--t1); }
    .s-value.green { color: var(--green); }
    .s-value.red { color: var(--red); }

    /* MAIN GRID */
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

    /* CARD */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 1.5rem; }
    .card-title { font-size: 15px; font-weight: 600; color: var(--t1); margin-bottom: 1.25rem; }

    /* CHART */
    .chart-wrap { position: relative; width: 180px; height: 180px; margin: 0 auto 1.25rem; }
    .chart-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
    .chart-center-amt { display: block; font-size: 18px; font-weight: 700; color: var(--t1); }
    .chart-center-lbl { display: block; font-size: 11px; color: var(--t3); }

    /* LEGEND */
    .legend { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .legend li { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
    .legend-name { color: var(--t2); display: flex; align-items: center; }
    .legend-val { font-weight: 600; color: var(--t1); }

    /* BUDGETS */
    .budget-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 1.5rem; }
    .budget-item { display: flex; flex-direction: column; gap: 5px; }
    .budget-row { display: flex; justify-content: space-between; font-size: 13px; }
    .budget-name { color: var(--t2); }
    .budget-amt { font-weight: 600; }
    .bar-bg { height: 5px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; background: var(--purple); transition: width 0.4s ease; }
    .bar-fill.warn { background: var(--amber); }
    .bar-fill.danger { background: var(--red); }

    hr.divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    /* FORM */
    .add-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .full { grid-column: 1 / -1; }
    .form-input, .form-select {
      width: 100%; padding: 9px 12px;
      background: var(--input); color: var(--t1);
      border: 1px solid var(--border); border-radius: 10px;
      font-family: var(--font); font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--purple); }
    .form-input::placeholder { color: var(--t3); }
    .form-select option { background: var(--bg3); }

    /* TRANSACTIONS */
    .tx-section { display: flex; flex-direction: column; gap: 1rem; }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .f-btn {
      padding: 5px 14px; border-radius: 99px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: transparent; color: var(--t2);
      cursor: pointer; font-family: var(--font); transition: all 0.2s;
    }
    .f-btn:hover { border-color: var(--purple); color: var(--t1); }
    .f-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: 14px; pointer-events: none; }
    .search-wrap input { padding-left: 36px; }

    .tx-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
    .tx-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-radius: 12px; transition: background 0.15s; }
    .tx-item:hover { background: var(--bg3); }
    .tx-left { display: flex; align-items: center; gap: 12px; }
    .tx-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .tx-name { font-size: 14px; font-weight: 500; color: var(--t1); }
    .tx-cat { font-size: 12px; color: var(--t3); margin-top: 1px; }
    .tx-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .tx-amount { font-size: 14px; font-weight: 700; }
    .tx-amount.pos { color: var(--green); }
    .tx-amount.neg { color: var(--red); }
    .tx-date { font-size: 11px; color: var(--t3); }
    .tx-del { background: none; border: none; color: var(--t3); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 6px; margin-left: 8px; transition: all 0.2s; display: none; }
    .tx-item:hover .tx-del { display: block; }
    .tx-del:hover { color: var(--red); background: rgba(255,77,109,0.1); }
    .tx-empty { text-align: center; padding: 2.5rem; color: var(--t3); font-size: 14px; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; width: 90%; max-width: 440px; animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--t2); font-size: 22px; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--red); }
    .modal-form { display: flex; flex-direction: column; gap: 12px; }
    .form-label { font-size: 12px; color: var(--t3); margin-bottom: -6px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
      background: var(--bg3); border: 1px solid var(--purple);
      color: var(--t1); padding: 12px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 500;
      animation: fadeInOut 2.5s ease forwards;
      box-shadow: 0 0 20px rgba(124,92,191,0.3);
    }
    @keyframes fadeInOut {
      0%  { opacity: 0; transform: translateY(10px); }
      15% { opacity: 1; transform: translateY(0); }
      80% { opacity: 1; }
      100%{ opacity: 0; }
    }

    @media (max-width: 700px) {
      .summary-grid { grid-template-columns: 1fr; }
      .main-grid { grid-template-columns: 1fr; }
      nav { padding: 1rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-left">
      <span class="logo">ExpenseIQ</span>
      <span class="nav-month" id="navMonth"></span>
    </div>
    <div class="nav-right">
      <button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-accent" onclick="openModal()">+ Add Transaction</button>
    </div>
  </nav>

  <div class="wrapper">

    <!-- SUMMARY CARDS -->
    <div class="summary-grid">
      <div class="summary-card">
        <span class="s-label">Total Balance</span>
        <span class="s-value" id="balDisplay">R 0.00</span>
      </div>
      <div class="summary-card income-card">
        <span class="s-label">Total Income</span>
        <span class="s-value green" id="incDisplay">R 0.00</span>
      </div>
      <div class="summary-card expense-card">
        <span class="s-label">Total Expenses</span>
        <span class="s-value red" id="expDisplay">R 0.00</span>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">

      <!-- CHART CARD -->
      <div class="card">
        <div class="card-title">Spending Breakdown</div>
        <div class="chart-wrap">
          <canvas id="donutChart"></canvas>
          <div class="chart-center">
            <span class="chart-center-amt" id="chartAmt">R 0</span>
            <span class="chart-center-lbl">spent</span>
          </div>
        </div>
        <ul class="legend" id="legend"></ul>
      </div>

      <!-- BUDGET + FORM -->
      <div class="card">
        <div class="card-title">Budget Goals</div>
        <div class="budget-list" id="budgetList"></div>
        <hr class="divider" />
        <div class="card-title">Quick Add</div>
        <div class="add-form">
          <input  type="text"   class="form-input full" id="qDesc" placeholder="Description" />
          <input  type="number" class="form-input"      id="qAmt"  placeholder="Amount (R)" min="0" step="0.01" />
          <select class="form-select"                   id="qType">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
          <select class="form-select full" id="qCat">
            <option value="Food & Groceries">🛒 Food & Groceries</option>
            <option value="Transport">🚌 Transport</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Utilities">💡 Utilities</option>
            <option value="Other">📦 Other</option>
          </select>
          <input type="date" class="form-input full" id="qDate" />
          <button class="btn btn-accent full" onclick="quickAdd()">Add Transaction</button>
        </div>
      </div>

    </div>

    <!-- TRANSACTIONS -->
    <div class="card tx-section">
      <div class="card-title">Transaction History</div>
      <div class="filter-bar" id="filterBar">
        <button class="f-btn active" data-filter="all">All</button>
        <button class="f-btn" data-filter="income">Income</button>
        <button class="f-btn" data-filter="expense">Expenses</button>
        <button class="f-btn" data-filter="Food & Groceries">Food</button>
        <button class="f-btn" data-filter="Transport">Transport</button>
        <button class="f-btn" data-filter="Entertainment">Entertainment</button>
        <button class="f-btn" data-filter="Utilities">Utilities</button>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="form-input" id="searchInput" placeholder="Search transactions..." oninput="renderTransactions()" />
      </div>
      <ul class="tx-list" id="txList"></ul>
    </div>

  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Add Transaction</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-form">
        <span class="form-label">Description</span>
        <input type="text"   class="form-input" id="mDesc" placeholder="e.g. Checkers Groceries" />
        <span class="form-label">Amount (R)</span>
        <input type="number" class="form-input" id="mAmt"  placeholder="0.00" min="0" step="0.01" />
        <span class="form-label">Type</span>
        <select class="form-select" id="mType">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
        <span class="form-label">Category</span>
        <select class="form-select" id="mCat">
          <option value="Food & Groceries">🛒 Food & Groceries</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Utilities">💡 Utilities</option>
          <option value="Other">📦 Other</option>
        </select>
        <span class="form-label">Date</span>
        <input type="date" class="form-input" id="mDate" />
        <button class="btn btn-accent" onclick="modalAdd()">Save Transaction</button>
      </div>
    </div>
  </div>

<script>
  const BUDGETS = {
    'Food & Groceries': 1500,
    'Transport':        700,
    'Entertainment':    300,
    'Utilities':        500
  };

  const CAT_COLORS = {
    'Food & Groceries': '#7c5cbf',
    'Transport':        '#00d4ff',
    'Entertainment':    '#d45cbf',
    'Utilities':        '#ffb347',
    'Other':            '#55556a',
    'income':           '#00e676'
  };

  const CAT_ICONS = {
    'Food & Groceries': '🛒',
    'Transport':        '🚌',
    'Entertainment':    '🎬',
    'Utilities':        '💡',
    'Other':            '📦',
    'income':           '💰'
  };

  let transactions = JSON.parse(localStorage.getItem('expenseiq_txs') || '[]');
  let activeFilter = 'all';
  let chart = null;

  function save() {
    localStorage.setItem('expenseiq_txs', JSON.stringify(transactions));
  }

  function init() {
    document.getElementById('navMonth').textContent =
      new Date().toLocaleDateString('en-ZA', { month: 'long', year: 'numeric' });

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('qDate').value = today;
    document.getElementById('mDate').value = today;

    document.getElementById('filterBar').addEventListener('click', e => {
      const btn = e.target.closest('.f-btn');
      if (!btn) return;
      document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderTransactions();
    });

    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    render();
  }

  function render() {
    renderSummary();
    renderChart();
    renderBudgets();
    renderTransactions();
  }

  function renderSummary() {
    const income  = transactions.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
    const expense = transactions.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
    const balance = income - expense;
    document.getElementById('balDisplay').textContent = 'R ' + Math.abs(balance).toLocaleString('en-ZA', {minimumFractionDigits:2}) + (balance < 0 ? ' (-)' : '');
    document.getElementById('incDisplay').textContent = 'R ' + income.toLocaleString('en-ZA', {minimumFractionDigits:2});
    document.getElementById('expDisplay').textContent = 'R ' + expense.toLocaleString('en-ZA', {minimumFractionDigits:2});
  }

  function renderChart() {
    const totals = {};
    transactions.filter(t => t.type === 'expense').forEach(t => {
      totals[t.category] = (totals[t.category] || 0) + t.amount;
    });
    const cats   = Object.keys(totals);
    const vals   = cats.map(c => totals[c]);
    const colors = cats.map(c => CAT_COLORS[c] || '#7c5cbf');
    const total  = vals.reduce((s,v) => s + v, 0);

    document.getElementById('chartAmt').textContent =
      'R ' + total.toLocaleString('en-ZA', {minimumFractionDigits:0, maximumFractionDigits:0});

    const ctx = document.getElementById('donutChart').getContext('2d');
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: cats.length ? cats : ['No data'],
        datasets: [{
          data:            cats.length ? vals : [1],
          backgroundColor: cats.length ? colors : ['#1a1a2e'],
          borderWidth:     cats.length ? 3 : 0,
          borderColor:     '#12121e',
          hoverOffset:     6
        }]
      },
      options: {
        cutout: '72%',
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: cats.length > 0,
            callbacks: { label: c => ` ${c.label}: R ${c.raw.toLocaleString('en-ZA', {minimumFractionDigits:2})}` }
          }
        }
      }
    });

    document.getElementById('legend').innerHTML = cats.length === 0
      ? '<li style="color:var(--t3);font-size:13px">No expenses yet</li>'
      : cats.map((c,i) => `
          <li>
            <span class="legend-name"><span class="legend-dot" style="background:${colors[i]}"></span>${c}</span>
            <span class="legend-val">R ${vals[i].toLocaleString('en-ZA',{minimumFractionDigits:2})}</span>
          </li>`).join('');
  }

  function renderBudgets() {
    const spent = {};
    transactions.filter(t => t.type === 'expense').forEach(t => {
      spent[t.category] = (spent[t.category] || 0) + t.amount;
    });
    document.getElementById('budgetList').innerHTML = Object.entries(BUDGETS).map(([cat, limit]) => {
      const s   = spent[cat] || 0;
      const pct = Math.min((s / limit) * 100, 100);
      const cls = pct >= 100 ? 'danger' : pct >= 85 ? 'warn' : '';
      const col = pct >= 100 ? 'var(--red)' : pct >= 85 ? 'var(--amber)' : 'var(--t1)';
      return `
        <div class="budget-item">
          <div class="budget-row">
            <span class="budget-name">${cat}</span>
            <span class="budget-amt" style="color:${col}">
              R ${s.toLocaleString('en-ZA',{minimumFractionDigits:0})} / R ${limit.toLocaleString('en-ZA')}
            </span>
          </div>
          <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');
  }

  function renderTransactions() {
    const search = (document.getElementById('searchInput').value || '').toLowerCase();
    let list = [...transactions].reverse();
    if (activeFilter === 'income')       list = list.filter(t => t.type === 'income');
    else if (activeFilter === 'expense') list = list.filter(t => t.type === 'expense');
    else if (activeFilter !== 'all')     list = list.filter(t => t.category === activeFilter);
    if (search) list = list.filter(t =>
      t.desc.toLowerCase().includes(search) || t.category.toLowerCase().includes(search));

    const el = document.getElementById('txList');
    if (list.length === 0) {
      el.innerHTML = '<li class="tx-empty">No transactions found. Add one above!</li>';
      return;
    }
    el.innerHTML = list.map(t => {
      const icon = t.type === 'income' ? '💰' : (CAT_ICONS[t.category] || '📦');
      const sign = t.type === 'income' ? '+' : '-';
      const cls  = t.type === 'income' ? 'pos' : 'neg';
      const date = new Date(t.date + 'T00:00:00').toLocaleDateString('en-ZA', {day:'numeric', month:'short'});
      return `
        <li class="tx-item">
          <div class="tx-left">
            <div class="tx-icon">${icon}</div>
            <div>
              <div class="tx-name">${t.desc}</div>
              <div class="tx-cat">${t.category}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            <div class="tx-right">
              <span class="tx-amount ${cls}">${sign} R ${t.amount.toLocaleString('en-ZA',{minimumFractionDigits:2})}</span>
              <span class="tx-date">${date}</span>
            </div>
            <button class="tx-del" onclick="deleteTx('${t.id}')" title="Delete">✕</button>
          </div>
        </li>`;
    }).join('');
  }

  function addTransaction(desc, amount, type, category, date) {
    if (!desc || !amount || isNaN(amount) || Number(amount) <= 0) {
      showToast(' Please fill all fields correctly'); return false;
    }
    transactions.push({
      id: Date.now().toString(),
      desc: desc.trim(),
      amount: parseFloat(amount),
      type,
      category: type === 'income' ? 'income' : category,
      date
    });
    save(); render();
    showToast(' Transaction added!');
    return true;
  }

  function quickAdd() {
    const ok = addTransaction(
      document.getElementById('qDesc').value,
      document.getElementById('qAmt').value,
      document.getElementById('qType').value,
      document.getElementById('qCat').value,
      document.getElementById('qDate').value
    );
    if (ok) {
      document.getElementById('qDesc').value = '';
      document.getElementById('qAmt').value  = '';
    }
  }

  function modalAdd() {
    const ok = addTransaction(
      document.getElementById('mDesc').value,
      document.getElementById('mAmt').value,
      document.getElementById('mType').value,
      document.getElementById('mCat').value,
      document.getElementById('mDate').value
    );
    if (ok) closeModal();
  }

  function deleteTx(id) {
    transactions = transactions.filter(t => t.id !== id);
    save(); render();
    showToast('🗑️ Transaction deleted');
  }

  function openModal()  { document.getElementById('modalOverlay').classList.add('open'); }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('mDesc').value = '';
    document.getElementById('mAmt').value  = '';
  }

  function exportCSV() {
    if (!transactions.length) { showToast(' No transactions to export'); return; }
    const rows = [['Date','Description','Category','Type','Amount']];
    transactions.forEach(t => rows.push([t.date, t.desc, t.category, t.type, t.amount.toFixed(2)]));
    const blob = new Blob([rows.map(r => r.join(',')).join('\n')], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'expenseiq_transactions.csv';
    a.click();
    showToast(' CSV exported!');
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2800);
  }

  init();
</script>
</body>
</html>
